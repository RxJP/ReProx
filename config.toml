[proxy]
port = 8700
backlog = 256         # listen() backlog (SOMAXCONN if omitted or <= 0)
buffer_size = 4096        # per-connection recv/send buffer in bytes
upstream_host = "127.0.0.1" # address of the server to forward requests to
upstream_port = 10001        # port of the upstream server

[epoll]
max_events = 128        # maximum events returned by a single epoll_wait call
